let curView='map',curLang='',sortCol='kv',sortDir='desc',allExp=false;

// Populate filter dropdowns
(function(){
  const cs=new Set(),ts=new Set();
  DATA.forEach(d=>{cs.add(d.cluster);ts.add(d.content_type);});
  const fc=document.getElementById('f-cluster'),ft=document.getElementById('f-type');
  cs.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;fc.appendChild(o);});
  ts.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;ft.appendChild(o);});
})();

// Load saved statuses
(function(){
  try{
    const s=JSON.parse(localStorage.getItem('macedasurfcamp_com_statuses'));
    if(s)s.forEach((v,i)=>{if(DATA[i])DATA[i].status=v;});
  }catch(e){}
})();

function saveStatuses(){localStorage.setItem('macedasurfcamp_com_statuses',JSON.stringify(DATA.map(d=>d.status)));}
function updateStatus(sel){DATA[parseInt(sel.dataset.idx)].status=sel.value;saveStatuses();renderMap();}

function showView(v){curView=v;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');document.getElementById('view-map').classList.toggle('visible',v==='map');document.getElementById('view-table').classList.toggle('visible',v==='table');document.getElementById('table-filters').classList.toggle('visible',v==='table');if(v==='map')renderMap();else renderTable();}
function filterLang(btn){curLang=btn.dataset.lang;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(curView==='map')renderMap();else renderTable();}
function toggleAll(){allExp=!allExp;document.getElementById('btn-expand').textContent=allExp?'Collapse All':'Expand All';document.querySelectorAll('.cbody,.gbody').forEach(el=>el.classList.toggle('open',allExp));document.querySelectorAll('.chev,.chev2').forEach(el=>el.classList.toggle('open',allExp));}
function tog(el){el.nextElementSibling.classList.toggle('open');el.querySelector('.chev,.chev2').classList.toggle('open');}
function tc(t){if(t.includes('home'))return'gt-h';if(t.includes('hub'))return'gt-p';if(t.includes('landing'))return'gt-l';if(t.includes('blog'))return'gt-b';if(t.includes('faq'))return'gt-f';return'gt-c';}
function sc(s){return 's-'+s.replace(/ /g,'-').toLowerCase();}

function renderMap(){
  const c=document.getElementById('view-map');let h='';
  CLUSTERS.forEach(cl=>{
    const pages=cl.groups.flatMap(g=>g.pages);
    const fp=curLang?pages.filter(p=>p.language===curLang):pages;
    if(fp.length===0)return;
    const tv=fp.reduce((s,p)=>s+(p.kv||0),0);
    h+='<div class="cluster-row"><div class="cluster-header" onclick="tog(this)"><span class="chev">&#9654;</span><span class="cname">'+cl.name+'</span><div class="cbadges"><span class="badge bp">'+fp.length+' pages</span><span class="badge bv">'+tv.toLocaleString()+' vol</span></div></div><div class="cbody">';
    cl.groups.forEach(g=>{
      const gp=curLang?g.pages.filter(p=>p.language===curLang):g.pages;
      if(gp.length===0)return;
      h+='<div class="gr"><div class="gh" onclick="tog(this)"><span class="chev2">&#9654;</span><span class="gn">'+g.name+'</span><span class="gt '+tc(g.type.toLowerCase())+'">'+g.type+'</span><div class="gl">';
      const langs=[...new Set(gp.map(p=>p.language))];
      langs.forEach(l=>{h+='<span class="ml ml-'+l+'">'+l+'</span>';});
      h+='</div></div><div class="gbody">';
      gp.forEach(p=>{
        const idx=DATA.indexOf(p);
        const intent=p.intent?p.intent.split('/')[0]:'';
        const opts=['Not Started','In Progress','Review','Published'].map(o=>'<option value="'+o+'"'+(p.status===o?' selected':'')+'>'+o+'</option>').join('');
        h+='<div class="pd"><span class="pl pl-'+p.language+'">'+p.language.toUpperCase()+'</span><div class="pm">';
        h+='<div class="ptr"><span class="ptt">'+p.title+'</span><span class="pts">'+p.slug+'</span>';
        if(p.priority)h+='<span class="ppri ppri-'+p.priority+'">'+p.priority+'</span>';
        h+='<span class="sb '+sc(p.status)+'">'+p.status+'</span>';
        h+='<select class="ssel" data-idx="'+idx+'" onchange="updateStatus(this)" style="margin-left:6px">'+opts+'</select></div>';
        h+='<div class="pkr"><span class="pkk">'+p.primary_keyword+'</span><span class="pkm"><b>'+((p.kv||0)).toLocaleString()+'</b> vol</span><span class="pkm">KD '+(p.kd!==null?p.kd:'?')+'</span>';
        if(intent)h+='<span class="ib i-'+intent+'">'+intent+'</span>';
        h+='</div>';
        if(p.secondary_keywords)h+='<div class="psec">Secondary: '+p.secondary_keywords+'</div>';
        if(p.notes)h+='<div class="pnote">'+p.notes+'</div>';
        h+='</div></div>';
      });
      h+='</div></div>';
    });
    h+='</div></div>';
  });
  c.innerHTML=h;
}

function renderTable(){
  const fL=document.getElementById('f-lang').value,fC=document.getElementById('f-cluster').value,fT=document.getElementById('f-type').value,fI=document.getElementById('f-intent').value,fSt=document.getElementById('f-status').value,fS=document.getElementById('f-search').value.toLowerCase();
  let f=DATA.filter(d=>{
    if(fL&&d.language!==fL)return false;if(fC&&d.cluster!==fC)return false;if(fT&&d.content_type!==fT)return false;
    if(fI&&!d.intent.includes(fI))return false;if(fSt&&d.status!==fSt)return false;
    if(fS&&!JSON.stringify(d).toLowerCase().includes(fS))return false;return true;
  });
  f.sort((a,b)=>{let va=a[sortCol],vb=b[sortCol];if(va==null)va=-1;if(vb==null)vb=-1;if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toString().toLowerCase();}return sortDir==='asc'?(va<vb?-1:va>vb?1:0):(va>vb?-1:va<vb?1:0);});
  document.getElementById('tb').innerHTML=f.map(d=>{
    const idx=DATA.indexOf(d);
    const intent=d.intent?d.intent.split('/')[0]:'';
    const opts=['Not Started','In Progress','Review','Published'].map(o=>'<option value="'+o+'"'+(d.status===o?' selected':'')+'>'+o+'</option>').join('');
    return '<tr>'+
    '<td><span class="lb lb-'+d.language+'">'+d.language.toUpperCase()+'</span></td>'+
    '<td>'+d.cluster+'</td><td>'+d.content_type+'</td><td>'+d.title+'</td>'+
    '<td><code style="font-size:11px;color:#818cf8">'+d.slug+'</code></td>'+
    '<td style="font-weight:500">'+d.primary_keyword+'</td>'+
    '<td style="text-align:right">'+(d.kv||'—')+'</td><td style="text-align:right">'+(d.kd!==null?d.kd:'?')+'</td>'+
    '<td><span class="ib i-'+intent+'">'+intent+'</span></td>'+
    '<td>'+(d.priority?'<span class="ppri ppri-'+d.priority+'">'+d.priority+'</span>':'')+'</td>'+
    '<td><select class="ssel" data-idx="'+idx+'" onchange="updateStatus(this)">'+opts+'</select></td>'+
    '<td style="color:#a1a1aa;font-size:11px;font-style:italic">'+(d.notes||'')+'</td></tr>';
  }).join('');
  document.getElementById('visible-count').textContent=f.length+' of '+DATA.length;
  document.querySelectorAll('th').forEach(th=>th.classList.remove('sa','sd'));
  const st=document.querySelector('th[data-col="'+sortCol+'"]');if(st)st.classList.add(sortDir==='asc'?'sa':'sd');
}

document.querySelectorAll('th[data-col]').forEach(th=>{th.addEventListener('click',()=>{const col=th.dataset.col;if(sortCol===col)sortDir=sortDir==='asc'?'desc':'asc';else{sortCol=col;sortDir=th.dataset.type==='num'?'desc':'asc';}renderTable();});});
['f-lang','f-cluster','f-type','f-intent','f-status'].forEach(id=>document.getElementById(id).addEventListener('change',renderTable));
document.getElementById('f-search').addEventListener('input',renderTable);

function exportCSV(){
  const cols=['language','cluster','content_type','title','slug','primary_keyword','kv','kd','intent','priority','status','secondary_keywords','notes'];
  const csv=cols.join(',')+String.fromCharCode(10)+DATA.map(d=>cols.map(c=>'"'+String(d[c]||'').replace(/"/g,'""')+'"').join(',')).join(String.fromCharCode(10));
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='macedasurfcamp_com_content_map.csv';a.click();
}

renderMap();
</script>
